plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    id 'maven-publish'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()

    maven {
        url 'https://frcmaven.wpi.edu/artifactory/release'
    }
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is exported to consumers, that is to say found on their compile classpath.
    api libs.commons.math3

    // This dependency is used internally, and not exposed to consumers on their own compile classpath.
    implementation libs.guava

    implementation 'edu.wpi.first.wpiutil:wpiutil-java:2026.2.2'
    implementation 'edu.wpi.first.wpinet:wpinet-java:2026.2.2'
    implementation 'edu.wpi.first.wpimath:wpimath-java:2026.2.2'
    implementation 'edu.wpi.first.wpilibj:wpilibj-java:2026.2.2'
    implementation 'edu.wpi.first.wpiunits:wpiunits-java:2026.2.2'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}